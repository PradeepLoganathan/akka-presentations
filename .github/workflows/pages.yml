name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build training decks with presenter byline
        run: |
          python3 training/akka-sdk-fundamentals/builder/build.py --presenter pradeep
          python3 training/akka-sdk-workflows/builder/build.py    --presenter pradeep
          python3 training/akka-sdk-agents/builder/build.py       --presenter pradeep
          python3 training/akka-sdk-testing/builder/build.py      --presenter pradeep
          python3 training/akka-sdk-deploy/builder/build.py       --presenter pradeep

      - name: Regenerate landing page
        run: python3 build-index.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
