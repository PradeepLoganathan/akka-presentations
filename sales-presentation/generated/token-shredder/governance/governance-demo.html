<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Akka Governance — four-stage demo</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --black: #060606;
    --panel: #0D0D0D;
    --border: #1C1C1C;
    --yellow: #F5C518;
    --white: #fff;
    --muted: #888;
    --green: #28C840;
    --blue: #5BA3F5;
    --red: #ff6b6b;
    --pad: 32px;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--black); color: #ddd; margin: 0;
    font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    height: 100%; overflow: hidden;
  }
  body {
    display: flex; flex-direction: column;
    padding: 24px var(--pad) 24px 0;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: radial-gradient(circle, rgba(245,197,24,0.03) 1px, transparent 1px);
    background-size: 48px 48px; pointer-events:none; z-index:0;
  }

  /* ── Top: eyebrow + headline + phase pills ── */
  .gd-top {
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 var(--pad); margin-bottom: 20px;
    gap: 32px; flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .gd-eyebrow {
    font-size: 11px; text-transform: uppercase; letter-spacing: 3px;
    color: var(--yellow); font-weight: 600; margin-bottom: 8px;
  }
  .gd-eyebrow::before {
    content: ''; display: inline-block; width: 28px; height: 2px;
    background: var(--yellow); margin-right: 10px; vertical-align: middle;
  }
  .gd-headline {
    font-size: clamp(22px, 2.5vw, 34px); font-weight: 700;
    line-height: 1.1; letter-spacing: -0.02em; color: var(--white);
  }
  .gd-headline .accent { color: var(--yellow); }

  .gd-phases {
    display: flex; gap: 12px; flex-shrink: 0;
  }
  .gd-phase {
    border-left: 3px solid #222; padding: 6px 14px;
    min-width: 130px; cursor: pointer;
    transition: border-color .3s, color .3s, background .3s;
  }
  .gd-phase:hover { background: rgba(245,197,24,0.04); }
  .gd-phase-num {
    font-family: 'SF Mono', Consolas, monospace; font-size: 10px;
    color: #555; letter-spacing: 1px;
  }
  .gd-phase-title {
    font-size: 13px; font-weight: 700; color: #777;
    letter-spacing: -0.01em;
  }
  .gd-phase.active { border-left-color: var(--yellow); }
  .gd-phase.active .gd-phase-title { color: var(--yellow); }
  .gd-phase.done { border-left-color: var(--green); }
  .gd-phase.done .gd-phase-title { color: #999; }
  .gd-phase.done .gd-phase-title::after { content: ' ✔'; color: var(--green); }

  /* Terminal tabs */
  .gd-tabs {
    display: flex; flex-shrink: 0;
    background: #070707; border-bottom: 1px solid var(--border);
  }
  .gd-tab {
    flex: 1; padding: 10px 14px; cursor: pointer;
    font-size: 11px; font-weight: 600;
    color: #666; letter-spacing: 1px; text-transform: uppercase;
    border-right: 1px solid var(--border);
    border-bottom: 2px solid transparent;
    background: transparent;
    transition: color .2s, background .2s, border-color .2s;
    display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .gd-tab:last-child { border-right: none; }
  .gd-tab:hover { background: rgba(245,197,24,0.04); color: #aaa; }
  .gd-tab.active {
    color: var(--yellow);
    background: #0A0A0A;
    border-bottom-color: var(--yellow);
  }
  .gd-tab.done span::after { content: ' ✔'; color: var(--green); }
  .gd-tab.done:not(.active) { color: #888; }

  /* ── Main: terminal + artifact ── */
  .gd-main {
    flex: 1; min-height: 0;
    display: flex; gap: 28px;
    padding-left: 0;
    position: relative; z-index: 1;
  }
  .gd-term-col {
    width: 48%; flex-shrink: 0;
    display: flex; flex-direction: column; min-height: 0;
  }
  .gd-terminal {
    background: #0A0A0A;
    border: 1px solid var(--border);
    border-top-right-radius: 12px; border-bottom-right-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 120px rgba(245,197,24,0.05);
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
  }
  .gd-term-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
  }
  .gd-term-header .p-bracket { color: #555; }
  .gd-term-header .p-user { color: var(--green); font-weight: 600; }
  .gd-term-header .p-at { color: #555; }
  .gd-term-header .p-host { color: var(--blue); font-weight: 600; }
  .gd-term-header .p-dir { color: #555; }
  .gd-term-header .p-dollar { color: var(--yellow); font-weight: 700; margin-left: 2px; }
  .gd-term-body {
    padding: 14px 24px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 15px; line-height: 1.6;
    flex: 1; min-height: 0; overflow-y: auto;
  }
  .gd-term-body::-webkit-scrollbar { width: 4px; }
  .gd-term-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .gd-tline { white-space: pre-wrap; }
  .gd-tline .prompt { color: var(--yellow); user-select: none; }
  .gd-tline .cmd { color: var(--white); }
  .gd-tline .ai { color: #d4d4d4; font-style: italic; }
  .gd-tline .success { color: var(--green); }
  .gd-tline .warn { color: var(--yellow); font-weight: 600; }
  .gd-tline .user-ans { color: var(--blue); }
  .gd-tline .ai-prefix { color: var(--blue); font-weight: 700; user-select: none; }
  .gd-tline .ai-indent { color: transparent; user-select: none; white-space: pre; }
  .gd-stage-rule {
    border-top: 1px dashed #333; margin: 16px 0 12px;
    color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    padding-top: 8px;
  }

  .gd-cursor {
    display: inline-block; width: 7px; height: 13px;
    background: var(--yellow); vertical-align: middle;
    animation: gdblink 1s step-end infinite;
  }
  @keyframes gdblink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Artifact panel (right) ── */
  .gd-artifact-col {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .gd-artifact {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
  }
  .gd-art-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.02);
    flex-shrink: 0;
  }
  .gd-art-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--yellow); font-weight: 600;
  }
  .gd-art-sub {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 11px; color: #555; margin-left: auto;
  }
  .gd-art-body {
    flex: 1; min-height: 0; overflow-y: auto; overflow-x: auto;
    padding: 14px 18px;
  }
  .gd-art-body::-webkit-scrollbar { width: 4px; }
  .gd-art-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Stage 1: control rows */
  .gd-row {
    border-left: 2px solid var(--yellow);
    background: rgba(245,197,24,0.04);
    padding: 12px 14px; margin-bottom: 10px;
    border-radius: 0 6px 6px 0;
    opacity: 0; transform: translateX(-12px);
    transition: opacity .5s ease, transform .5s cubic-bezier(0.16,1,0.3,1);
    font-size: 14px; line-height: 1.5;
  }
  .gd-row.show { opacity: 1; transform: none; }
  .gd-row-top {
    display: flex; justify-content: space-between; gap: 10px;
    margin-bottom: 4px; align-items: baseline;
  }
  .gd-row-title { color: var(--white); font-weight: 600; }
  .gd-row-cite {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 11.5px; color: var(--yellow);
    background: rgba(245,197,24,0.1); padding: 2px 7px; border-radius: 3px;
    white-space: nowrap;
  }
  .gd-row-desc { color: #bbb; font-size: 13.5px; }

  /* Stage 2: matrix table */
  .gd-matrix {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .gd-matrix th {
    text-align: left; color: var(--yellow); font-weight: 600;
    text-transform: uppercase; font-size: 9.5px; letter-spacing: 1.5px;
    padding: 5px 7px; border-bottom: 1px solid #222;
    position: sticky; top: 0; background: var(--panel);
    white-space: nowrap;
  }
  .gd-matrix td {
    padding: 5px 7px; border-bottom: 1px solid #181818;
    vertical-align: middle; color: #bbb;
    white-space: nowrap;
  }
  .gd-matrix tr {
    opacity: 0; transform: translateY(-4px);
    transition: opacity .4s ease, transform .4s ease;
  }
  .gd-matrix tr.show { opacity: 1; transform: none; }
  .gd-mx-kind {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 10px; font-weight: 600; white-space: nowrap;
  }
  .gd-mx-kind.guardrail     { background: rgba(91,163,245,0.15); color: var(--blue); }
  .gd-mx-kind.hitl          { background: rgba(245,197,24,0.15); color: var(--yellow); }
  .gd-mx-kind.eval          { background: rgba(40,200,64,0.15); color: var(--green); }
  .gd-mx-kind.eval-periodic { background: rgba(40,200,64,0.15); color: var(--green); }
  .gd-mx-kind.eval-event    { background: rgba(126,200,227,0.15); color: #7EC8E3; }
  .gd-mx-kind.sanitizer     { background: rgba(199,146,234,0.15); color: #c792ea; }
  .gd-mx-kind.hotl          { background: rgba(255,107,107,0.15); color: var(--red); }
  .gd-mx-kind.ci-gate       { background: rgba(150,150,150,0.15); color: #aaa; }
  .gd-mx-kind.halt          { background: rgba(255,110,199,0.15); color: #ff6ec7; }
  .gd-mx-kind.doc           { background: rgba(150,150,150,0.15); color: #aaa; }
  /* .gd-erow-sub retired — subtitle removed from row headers to compress rows. */
  .gd-mx-src {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 10px; color: #777;
  }

  /* Stage 3: code block */
  .gd-code {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 13px; line-height: 1.7; color: #ccc;
    white-space: pre; padding: 4px 0;
  }
  .gd-code .kw   { color: #c792ea; }
  .gd-code .typ  { color: var(--yellow); }
  .gd-code .ann  { color: var(--blue); }
  .gd-code .str  { color: #c3e88d; }
  .gd-code .com  { color: #555; font-style: italic; }
  .gd-code .id   { color: #ddd; }
  .gd-line {
    display: block; padding: 0 12px;
    border-left: 2px solid transparent;
    transition: background .6s ease, border-color .6s ease;
  }
  .gd-line.hit {
    background: rgba(245,197,24,0.07);
    border-left-color: var(--yellow);
  }
  .gd-callout {
    color: var(--yellow); font-style: normal;
    background: rgba(245,197,24,0.12); padding: 1px 6px;
    border-radius: 3px; margin-left: 8px; font-size: 10.5px;
  }

  /* Stage 3: expandable enforce matrix */
  /* The enforce-row list now scrolls vertically as a unit — each expanded
     row takes exactly as much height as its content requires, instead of
     all rows being clamped to the same fixed height. */
  .gd-enforce {
    display: block;            /* not flex — let each row's height be its own */
    height: 100%; min-height: 0; overflow-y: auto;
    padding-right: 4px;
  }
  .gd-enforce > .gd-erow + .gd-erow { margin-top: 6px; }
  .gd-erow {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
    overflow: hidden;
    transition: background .2s, border-color .2s;
  }
  .gd-erow:hover { border-color: #2a2a2a; }
  .gd-erow.expanded {
    border-color: var(--yellow);
    background: rgba(245,197,24,0.04);
  }
  .gd-erow.flash { animation: gd-flash .8s ease; }
  @keyframes gd-flash {
    0%   { background: rgba(245,197,24,0.25); }
    100% { background: rgba(245,197,24,0.04); }
  }
  .gd-erow-head {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12.5px;
    flex-shrink: 0;
    user-select: none;
  }
  .gd-erow-chevron {
    color: #666; font-family: 'SF Mono', Consolas, monospace;
    width: 12px; text-align: center;
    transition: transform .2s, color .2s;
  }
  .gd-erow.expanded .gd-erow-chevron {
    color: var(--yellow); transform: rotate(90deg);
  }
  .gd-erow-title { color: #ddd; flex: 1; font-weight: 500; }
  .gd-erow .gd-mx-kind { font-size: 10px; }
  .gd-erow-cite {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 10.5px; color: #888;
  }
  .gd-erow-bodywrap {
    display: none;
    border-top: 1px solid var(--border);
    background: #060606;
  }
  .gd-erow.expanded .gd-erow-bodywrap { display: block; }
  .gd-erow-filename {
    color: var(--blue); font-size: 11px;
    font-family: 'SF Mono', Consolas, monospace;
    padding: 6px 14px;
    background: rgba(91,163,245,0.05);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .gd-erow-body {
    padding: 12px 14px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 12.5px; line-height: 1.6;
    color: #ddd;
    white-space: pre-wrap;       /* soft-wrap long lines so configuration is fully readable */
    word-break: break-word;
  }
  .gd-erow-body::-webkit-scrollbar { width: 4px; }
  .gd-erow-body::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .gd-erow-body .kw  { color: #c792ea; }
  .gd-erow-body .ann { color: var(--blue); }
  .gd-erow-body .typ { color: var(--yellow); }
  .gd-erow-body .str { color: #c3e88d; }
  .gd-erow-body .com { color: #555; font-style: italic; }
  .gd-erow-body .key { color: var(--yellow); }

  /* Stage 4: drift panel */
  .gd-drift-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; margin-bottom: 8px;
    border-radius: 6px; font-size: 13.5px;
    border-left: 2px solid #333;
    background: rgba(255,255,255,0.02);
    opacity: 0; transform: translateX(-8px);
    transition: opacity .4s ease, transform .4s ease;
  }
  .gd-drift-row.show { opacity: 1; transform: none; }
  .gd-drift-row.pass { border-left-color: var(--green); }
  .gd-drift-row.warn { border-left-color: var(--yellow); background: rgba(245,197,24,0.06); }
  .gd-drift-row.fail { border-left-color: var(--red); background: rgba(255,107,107,0.06); }
  .gd-drift-name { color: var(--white); }
  .gd-drift-cite { font-family: 'SF Mono', Consolas, monospace; font-size: 10px; color: #777; }
  .gd-drift-status { font-size: 11px; font-weight: 600; }
  .gd-drift-status.pass { color: var(--green); }
  .gd-drift-status.warn { color: var(--yellow); }
  .gd-drift-status.fail { color: var(--red); }

  .gd-change-card {
    margin-top: 16px; padding: 14px;
    background: rgba(91,163,245,0.06);
    border: 1px solid rgba(91,163,245,0.3);
    border-radius: 8px;
    opacity: 0; transform: translateY(8px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .gd-change-card.show { opacity: 1; transform: none; }
  .gd-change-card h4 {
    margin: 0 0 8px; color: var(--blue);
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  }
  .gd-change-card ul {
    margin: 0; padding: 0; list-style: none;
    font-size: 12px; color: #ccc; line-height: 1.7;
  }
  .gd-change-card li::before {
    content: '→'; color: var(--blue); margin-right: 8px;
  }

  /* Stub placeholder for unfinished stages */
  .gd-stub {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #555; font-size: 13px;
    text-align: center; padding: 40px;
    line-height: 1.6;
  }
  .gd-stub strong { color: var(--yellow); display: block; margin-bottom: 8px; }

  /* Hint bar */
  .gd-hint {
    position: fixed; bottom: 12px; right: 16px;
    font-size: 11px; color: #555;
    font-family: 'SF Mono', Consolas, monospace;
    z-index: 10;
  }
  .gd-hint kbd {
    background: #222; border: 1px solid #333; border-radius: 3px;
    padding: 1px 6px; color: #aaa;
  }
</style>
</head>
<body>

<div class="gd-top">
  <div>
    <div class="gd-eyebrow">Governance demo</div>
    <div class="gd-headline">Define risk. Identify controls. <span class="accent">Enforce. Improve.</span></div>
  </div>
  <div class="gd-phases">
    <div class="gd-phase" data-phase="1"><div class="gd-phase-title">Define risk</div></div>
    <div class="gd-phase" data-phase="2"><div class="gd-phase-title">Identify controls</div></div>
    <div class="gd-phase" data-phase="3"><div class="gd-phase-title">Enforce posture</div></div>
    <div class="gd-phase" data-phase="4"><div class="gd-phase-title">Improve and adapt</div></div>
  </div>
</div>

<div class="gd-main">
  <div class="gd-term-col">
    <div class="gd-terminal">
      <div class="gd-tabs" id="termTabs">
        <div class="gd-tab" data-tab="1"><span>Define risk</span></div>
        <div class="gd-tab" data-tab="2"><span>Identify controls</span></div>
        <div class="gd-tab" data-tab="3"><span>Enforce posture</span></div>
        <div class="gd-tab" data-tab="4"><span>Improve and adapt</span></div>
      </div>
      <div class="gd-term-body" id="termBody"></div>
    </div>
  </div>

  <div class="gd-artifact-col">
    <div class="gd-artifact">
      <div class="gd-art-header">
        <span class="gd-art-label" id="artLabel">0 Regulations &middot; 0 Controls</span>
      </div>
      <div class="gd-art-body" id="artBody"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const termBody  = document.getElementById('termBody');
  const artLabel  = document.getElementById('artLabel');
  const artBody   = document.getElementById('artBody');
  const phaseEls  = document.querySelectorAll('.gd-phase');

  // Extract framework name from a citation, or null for project/corporate rules.
  function frameworkOf(cite){
    if (!cite) return null;
    if (/project|policy|Acme/i.test(cite)) return null;
    const m = cite.match(/^([A-Z][A-Za-z\s]+?)(?:\s+(Art\.|Rec\.|§|\+|v\d))/);
    return (m ? m[1] : cite).trim();
  }
  function refreshRegulationLabel(){
    const rows = artBody.querySelectorAll('.gd-row .gd-row-cite');
    const fwks = new Set();
    rows.forEach(el => {
      const f = frameworkOf(el.textContent);
      if (f) fwks.add(f);
    });
    artLabel.textContent = fwks.size + ' Regulations · ' + rows.length + ' Controls';
  }

  // ── Script: each entry runs one terminal step.
  // Types: cmd, ai, user, ok, warn, blank, divider, lines, art-set, art-add, art-replace, phase, pause
  const STAGE1 = [
    { type:'phase', phase:1, label:'0 Regulations · 0 Controls' },
    { type:'cmd', text:'akka ai survey start "loan-adjudication-assistant"' },
    { type:'ok',  text:'[survey] new risk survey started · 7 areas, 14 questions estimated' },
    { type:'blank' },

    { type:'ai',   text:'Where does this system operate? (countries / regions)' },
    { type:'user', text:'EU — Italy, France. Plus UK.' },
    { type:'art-add', row: {
      title: 'EU AI Act applies (high-risk pathway possible)',
      cite: 'EU AI Act',
      desc: 'System operating in EU member states is subject to the AI Act; Annex III classification pending later answers.',
      src: 'derived from: jurisdiction'
    }},
    { type:'art-add', row: {
      title: 'UK ICO automated-decision rules apply',
      cite: 'UK GDPR Art. 22',
      desc: 'Operating in the UK invokes ICO guidance on automated decision-making.',
      src: 'derived from: jurisdiction'
    }},
    { type:'blank' },

    { type:'ai',   text:'Does the system inform decisions that affect a person’s job, housing, credit, or benefits?' },
    { type:'user', text:'Yes — consumer-loan credit decisions.' },
    { type:'art-add', row: {
      title: 'High-risk AI: credit scoring (Annex III §5b)',
      cite: 'EU AI Act Art. 6',
      desc: 'Consumer-credit decisioning is Annex III high-risk → conformity assessment, technical file, post-market monitoring.',
      src: 'derived from: decision domain'
    }},
    { type:'art-add', row: {
      title: 'GDPR right to human review of automated decisions',
      cite: 'GDPR Art. 22',
      desc: 'Subjects must be able to contest a fully-automated decision and request human intervention.',
      src: 'derived from: decision domain'
    }},
    { type:'blank' },

    { type:'ai',   text:'Will a human review every decision before it is final?' },
    { type:'user', text:'No — auto-approve under €5000; human review above.' },
    { type:'art-add', row: {
      title: 'Effective human oversight on auto-approved cases',
      cite: 'EU AI Act Art. 14',
      desc: 'Auto-approval path requires real (not nominal) oversight: monitoring, override capability, periodic sampling.',
      src: 'derived from: oversight model'
    }},
    { type:'art-add', row: {
      title: 'Explanation of the decision available on request',
      cite: 'UK ICO + GDPR Rec. 71',
      desc: 'Applicant must be able to obtain the meaningful logic of the credit decision.',
      src: 'derived from: oversight model + jurisdiction'
    }},

        scrollTerm();
        setTimeout(tick, charMs);

  function expandEnforceRow(key, flash){
    const rows = artBody.querySelectorAll('.gd-erow');
    rows.forEach(el => {
      if (el.getAttribute('data-key') === key){
        el.classList.add('expanded');
        if (flash){
          el.classList.remove('flash');
          void el.offsetWidth;            // reflow to retrigger animation
          el.classList.add('flash');
        }
      } else {
        el.classList.remove('expanded');
      }
    });
  }

  function bindEnforceClicks(){
    artBody.querySelectorAll('.gd-erow').forEach(el => {
      el.querySelector('.gd-erow-head').addEventListener('click', () => {
        const key = el.getAttribute('data-key');
        if (el.classList.contains('expanded')){
          el.classList.remove('expanded');
        } else {
          expandEnforceRow(key, false);
        }
      });
    });
  }

  function renderCodeBlock(){
    // Lines with data-hit ids for callout targeting.
    const lines = [
      ['plain', '<span class="ann">@Workflow</span>'],
      ['plain', '<span class="kw">public class</span> <span class="typ">LoanAdjudicationWorkflow</span> {'],
      ['plain', ''],
      ['plain', '  <span class="ann">@Step</span>(<span class="str">"assess"</span>)'],
      ['plain', '  <span class="kw">public</span> Effect&lt;Decision&gt; assess(LoanRequest req) {'],
      ['sanitizer', '    <span class="kw">var</span> safe = sanitizers.stripPII(req);'],
      ['guardrail', '    guardrails.checkRefusalRules(safe);'],
      ['plain', '    <span class="kw">var</span> draft = agent.draftDecision(safe);'],
      ['plain', ''],
      ['hitl', '    <span class="kw">if</span> (draft.amount &gt; 5000)'],
      ['hitl', '      <span class="kw">return</span> effects().pause(humanApproval());'],
      ['plain', ''],
      ['plain', '    <span class="kw">return</span> effects().reply(draft);'],
      ['plain', '  }'],
      ['plain', ''],
      ['eval', '  <span class="ann">@MonthlyEval</span>(<span class="str">"demographic-parity"</span>)'],
      ['eval', '  <span class="kw">public</span> EvalReport parityCheck() { ... }'],
      ['plain', ''],
      ['hotl', '  <span class="ann">@OnSignal</span>(RefusalRateSpike.class)'],
      ['hotl', '  <span class="kw">public void</span> escalate(SpikeEvent e) { ... }'],
      ['plain', '}']
    ];
    return '<div class="gd-code">' +
      lines.map(([tag, html]) =>
        '<span class="gd-line" data-tag="' + tag + '">' + (html || '&nbsp;') + '</span>'
      ).join('') +
      '</div>';
  }

  // ── step handlers
  function handle(step, cb){
    if (step.type === 'phase'){
      setPhase(step.phase);
      setArtifactKind('rows', step.label || '0 Regulations · 0 Controls');
      cb();
    } else if (step.type === 'phase-done'){
      markPhaseDone(step.phase);
      cb();
    } else if (step.type === 'art-set'){
      const k = step.kind;
      const labels = {
        matrix:  'Eval Matrix v1',
        code:    'Generated workflow',
        enforce: 'Generated bindings',
        drift:   'Posture vs Eval Matrix'
      }[k] || 'Artifact';
      setArtifactKind(k, labels);
      cb();

    } else if (step.type === 'art-add'){
      const r = step.row;
      const div = document.createElement('div');
      div.className = 'gd-row';
      div.innerHTML =
        '<div class="gd-row-top">'
        +   '<span class="gd-row-title">' + escapeHtml(r.title) + '</span>'
        +   '<span class="gd-row-cite">' + escapeHtml(r.cite) + '</span>'
        + '</div>'
        + '<div class="gd-row-desc">' + escapeHtml(r.desc) + '</div>';
      artBody.appendChild(div);
      requestAnimationFrame(() => div.classList.add('show'));
      refreshRegulationLabel();
      scrollArt();
      cb();

    } else if (step.type === 'matrix-add'){
      const [kind, ctl, src, enf] = step.row;
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td><span class="gd-mx-kind ' + kind + '">' + kind.toUpperCase() + '</span></td>'
      + '<td>' + escapeHtml(ctl) + '</td>'
      + '<td><span class="gd-mx-src">' + escapeHtml(src) + '</span></td>'
      + '<td>' + escapeHtml(enf) + '</td>';
      document.getElementById('mxBody').appendChild(tr);
      requestAnimationFrame(() => tr.classList.add('show'));
      scrollArt();
      cb();

    } else if (step.type === 'code-hit'){
      const tag = step.line;
      if (artBody.dataset.kind === 'enforce') {
        expandEnforceRow(tag, true);
      } else {
        artBody.querySelectorAll('.gd-line[data-tag="' + tag + '"]').forEach(el => {
          el.classList.add('hit');
          if (!el.querySelector('.gd-callout')){
            const c = document.createElement('span');
            c.className = 'gd-callout';
            c.textContent = '◀ ' + step.note;
            el.appendChild(c);
          }
        });
      }
      cb();

    } else if (step.type === 'drift-add'){
      const r = step.row;
      const div = document.createElement('div');
      div.className = 'gd-drift-row ' + r.status;
      div.innerHTML =
        '<div>'
        +   '<div class="gd-drift-name">' + escapeHtml(r.name) + '</div>'
        +   '<div class="gd-drift-cite">' + escapeHtml(r.cite) + ' · ' + escapeHtml(r.msg) + '</div>'
        + '</div>'
        + '<div class="gd-drift-status ' + r.status + '">'
        + ({ pass:'✓ pass', warn:'⚠ review', fail:'✕ fail' }[r.status])
        + '</div>';
      document.getElementById('driftBody').appendChild(div);
      requestAnimationFrame(() => div.classList.add('show'));
      scrollArt();
      cb();

    } else if (step.type === 'change-card'){
      const c = step.card;
      const div = document.createElement('div');
      div.className = 'gd-change-card';
      div.innerHTML =
        '<h4>' + escapeHtml(c.title) + '</h4>'
      + '<ul>' + c.items.map(i => '<li>' + escapeHtml(i) + '</li>').join('') + '</ul>';
      document.getElementById('driftBody').appendChild(div);
      requestAnimationFrame(() => div.classList.add('show'));
      scrollArt();
      cb();

    } else if (step.type === 'cmd'){
      const line = document.createElement('div');
      line.className = 'gd-tline';
      line.innerHTML = '<span class="prompt">$ </span>';
      const cmd = document.createElement('span');
      cmd.className = 'cmd';
      line.appendChild(cmd);
      termBody.appendChild(line);
      addCursor(line);
      scrollTerm();
      const tk = token;
      typeText(cmd, step.text, CMD_CHAR_MS, () => {
        if (tk !== token) return;
        removeCursor();
        setTimeout(cb, PAUSE_AFTER_CMD);
      }, tk);

    } else if (step.type === 'ai'){
      setTimeout(() => instantLine('ai', step.text) || cb && setTimeout(cb, PAUSE_AFTER_STEP),
        WAIT_BEFORE_RESPONSE);

    } else if (step.type === 'user'){
      setTimeout(() => {
        const line = document.createElement('div');
        line.className = 'gd-tline';
        line.innerHTML = '<span class="prompt">&gt; </span>';
        const ans = document.createElement('span');
        ans.className = 'user-ans';
        line.appendChild(ans);
        termBody.appendChild(line);
        addCursor(line);
        scrollTerm();
        const tk = token;
        typeText(ans, step.text, 12, () => {
          if (tk !== token) return;
          removeCursor();
          setTimeout(cb, PAUSE_AFTER_STEP);
        }, tk);
      }, USER_DELAY);

    } else if (step.type === 'ok' || step.type === 'warn'){
      const cls = step.type === 'ok' ? 'success' : 'warn';
      setTimeout(() => {
        instantLine(cls, step.text);
        setTimeout(cb, PAUSE_AFTER_STEP);
      }, WAIT_BEFORE_RESPONSE);

    } else if (step.type === 'blank'){
      appendLine('&nbsp;');
      setTimeout(cb, 100);

    } else if (step.type === 'divider'){
      const d = document.createElement('div');
      d.className = 'gd-stage-rule';
      d.textContent = '── ' + step.text + ' ──';
      termBody.appendChild(d);
      scrollTerm();
      setTimeout(cb, PAUSE_AFTER_DIVIDER);

    } else {
      cb();
    }
  }

  function runNext(){
    if (!running) return;
    if (idx >= stageScript.length){
      running = false;
      removeCursor();
      const end = appendLine('<span class="prompt">$ </span>');
      addCursor(end);
      // Mark current stage tab as done
      tabEls.forEach(t => {
        if (+t.getAttribute('data-tab') === currentStage) t.classList.add('done');
      });
      markPhaseDone(currentStage);
      return;
    }
    const step = stageScript[idx++];
    handle(step, () => {
      if (running) runNext();
    });
  }

  function runStage(n){
    if (!STAGES[n]) return;
    token++;
    running = false;
    idx = 0;
    currentStage = n;
    stageScript = STAGES[n];
    termBody.innerHTML = '';
    removeCursor();
    // Reset active tab; keep .done markers
    tabEls.forEach(t => {
      t.classList.remove('active');
      if (+t.getAttribute('data-tab') === n) t.classList.add('active');
    });
    // Mirror to top phase pills (active only on current; done preserved)
    phaseEls.forEach(p => {
      p.classList.remove('active');
      if (+p.getAttribute('data-phase') === n) p.classList.add('active');
    });
    setArtifactKind('rows', '—');
    running = true;
    runNext();
  }

  function start(){
    // Reset all done/active markers. Wait for user to click a stage tab.
    tabEls.forEach(t => { t.classList.remove('done'); t.classList.remove('active'); });
    phaseEls.forEach(p => { p.classList.remove('done'); p.classList.remove('active'); });
    termBody.innerHTML =
      '<div class="gd-tline" style="color:#666;font-style:italic;padding:8px 0">'
      + '  click a tab above to run that stage  '
      + '</div>';
    setArtifactKind('rows', '—');
  }

  function finishCurrentStageInstantly(){
    if (!running) return;
    token++;             // cancel any pending typing/setTimeouts from runNext
    running = false;
    while (idx < stageScript.length){
      handleInstant(stageScript[idx++]);
    }
    removeCursor();
    const end = appendLine('<span class="prompt">$ </span>');
    addCursor(end);
    tabEls.forEach(t => {
      if (+t.getAttribute('data-tab') === currentStage) t.classList.add('done');
    });
    markPhaseDone(currentStage);
  }

  function activateStage(n){
    // Click on the currently-running stage → fast-forward to completion.
    if (running && n === currentStage){
      finishCurrentStageInstantly();
    } else {
      runStage(n);
    }
  }

  tabEls.forEach(t => {
    t.addEventListener('click', () => activateStage(+t.getAttribute('data-tab')));
  });
  phaseEls.forEach(p => {
    p.addEventListener('click', () => activateStage(+p.getAttribute('data-phase')));
  });
  termBody.style.cursor = 'pointer';
  termBody.addEventListener('click', () => {
    if (running) finishCurrentStageInstantly();
  });

  function handleInstant(step){
    // synchronous version of handle, no animations / delays
    if (step.type === 'phase'){ setPhase(step.phase); setArtifactKind('rows', step.label || '0 Regulations · 0 Controls'); return; }
    if (step.type === 'phase-done'){ markPhaseDone(step.phase); return; }
    if (step.type === 'art-set'){
      const k = step.kind;
      const labels = {
        matrix:  'Eval Matrix v1',
        code:    'Generated workflow',
        enforce: 'Generated bindings',
        drift:   'Posture vs Eval Matrix'
      }[k] || 'Artifact';
      setArtifactKind(k, labels); return;
    }
    if (step.type === 'art-add'){
      const r = step.row;
      const div = document.createElement('div');
      div.className = 'gd-row show';
      div.innerHTML =
        '<div class="gd-row-top">'
        + '<span class="gd-row-title">' + escapeHtml(r.title) + '</span>'
        + '<span class="gd-row-cite">' + escapeHtml(r.cite) + '</span>'
        + '</div>'
        + '<div class="gd-row-desc">' + escapeHtml(r.desc) + '</div>';
      artBody.appendChild(div);
      refreshRegulationLabel();
      return;
    }
    if (step.type === 'matrix-add'){
      const [kind, ctl, src, enf] = step.row;
      const tr = document.createElement('tr');
      tr.className = 'show';
      tr.innerHTML =
        '<td><span class="gd-mx-kind ' + kind + '">' + kind.toUpperCase() + '</span></td>'
      + '<td>' + escapeHtml(ctl) + '</td>'
      + '<td><span class="gd-mx-src">' + escapeHtml(src) + '</span></td>'
      + '<td>' + escapeHtml(enf) + '</td>';
      const mb = document.getElementById('mxBody');
      if (mb) mb.appendChild(tr);
      return;
    }
    if (step.type === 'code-hit'){
      if (artBody.dataset.kind === 'enforce') {
        expandEnforceRow(step.line, false);
      } else {
        artBody.querySelectorAll('.gd-line[data-tag="' + step.line + '"]').forEach(el => {
          el.classList.add('hit');
          if (!el.querySelector('.gd-callout')){
            const c = document.createElement('span');
            c.className = 'gd-callout';
            c.textContent = '◀ ' + step.note;
            el.appendChild(c);
          }
        });
      }
      return;
    }
    if (step.type === 'drift-add'){
      const r = step.row;
      const div = document.createElement('div');
      div.className = 'gd-drift-row show ' + r.status;
      div.innerHTML =
        '<div>'
        +   '<div class="gd-drift-name">' + escapeHtml(r.name) + '</div>'
        +   '<div class="gd-drift-cite">' + escapeHtml(r.cite) + ' · ' + escapeHtml(r.msg) + '</div>'
        + '</div>'
        + '<div class="gd-drift-status ' + r.status + '">'
        + ({ pass:'✓ pass', warn:'⚠ review', fail:'✕ fail' }[r.status])
        + '</div>';
      const db = document.getElementById('driftBody');
      if (db) db.appendChild(div);
      return;
    }
    if (step.type === 'change-card'){
      const c = step.card;
      const div = document.createElement('div');
      div.className = 'gd-change-card show';
      div.innerHTML =
        '<h4>' + escapeHtml(c.title) + '</h4>'
      + '<ul>' + c.items.map(i => '<li>' + escapeHtml(i) + '</li>').join('') + '</ul>';
      const db = document.getElementById('driftBody');
      if (db) db.appendChild(div);
      return;
    }
    if (step.type === 'cmd'){
      appendLine('<span class="prompt">$ </span><span class="cmd">' + escapeHtml(step.text) + '</span>');
      return;
    }
    if (step.type === 'ai'){ instantLine('ai', step.text); return; }
    if (step.type === 'user'){
      appendLine('<span class="prompt">&gt; </span><span class="user-ans">' + escapeHtml(step.text) + '</span>');
      return;
    }
    if (step.type === 'ok'){ instantLine('success', step.text); return; }
    if (step.type === 'warn'){ instantLine('warn', step.text); return; }
    if (step.type === 'blank'){ appendLine('&nbsp;'); return; }
    if (step.type === 'divider'){
      const d = document.createElement('div');
      d.className = 'gd-stage-rule';
      d.textContent = '── ' + step.text + ' ──';
      termBody.appendChild(d);
      return;
    }
  }

  // keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R'){ e.preventDefault(); runStage(currentStage); }
    else if (e.key === '1'){ e.preventDefault(); runStage(1); }
    else if (e.key === '2'){ e.preventDefault(); runStage(2); }
    else if (e.key === '3'){ e.preventDefault(); runStage(3); }
    else if (e.key === '4'){ e.preventDefault(); runStage(4); }
  });

  start();
})();
</script>
</body>
</html>
